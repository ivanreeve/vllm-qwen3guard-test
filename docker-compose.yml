services:
  ollama:
    image: ollama/ollama:latest
    container_name: pii-detection-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  ollama-pull:
    image: ollama/ollama:latest
    container_name: pii-detection-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-sileader/qwen3guard:0.6b}
    command: ["pull", "${OLLAMA_MODEL:-sileader/qwen3guard:0.6b}"]
    restart: "no"

  evaluator:
    build:
      context: .
      dockerfile: Dockerfile
    image: pii-detection-test:latest
    container_name: pii-detection-evaluator
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-sileader/qwen3guard:0.6b}
    command:
      [
        "--ollama-url",
        "http://ollama:11434",
        "--model",
        "${OLLAMA_MODEL:-sileader/qwen3guard:0.6b}",
        "--output",
        "results/results.json"
      ]
    user: "0:0"
    volumes:
      - ./data:/app/data:ro
      - ./results:/app/results
    restart: "no"

volumes:
  ollama-data:
